<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="popup.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body style="width: 400px;">
    <div class="px-4 pt-4 pb-3">
        <!-- page header -->
        <p class="fs-1 fw-bold text-center mb-3" style="letter-spacing: 0.03em;">
            Fast Lit Grabber
        </p>

        <!-- section header -->
        <div class="d-flex align-items-center text-center my-3">
            <div class="flex-grow-1 border-bottom"></div>
            <span class="mx-3">Grab an article</span>
            <div class="flex-grow-1 border-bottom"></div>
        </div>

        <!-- info text -->
        <p id="infoText" class="mb-3 text-center fs-6"></p>  

        <!-- button -->
        <button
            id="grabButton"
            class="btn btn-red-custom w-100 mb-2"
            type="button"
        >
            Grab
        </button>
    </div>

    <script src="popup.js"></script>
</body>
</html>
